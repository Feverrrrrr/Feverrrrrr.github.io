<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>万剑归宗</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #050608 100%);
            height: 100vh; cursor: crosshair; 
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/1231630/stars.png') repeat;
            opacity: 0.4; z-index: -1;
        }
        canvas { display: block; background: transparent; }
        #info {
            position: absolute; top: 20px; left: 20px; color: rgba(255, 220, 100, 0.9);
            font-family: "Microsoft YaHei", serif; pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); z-index: 10;
        }
        #video-container {
            position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px;
            border: 1px solid #ffd700; border-radius: 10px; overflow: hidden;
            transform: scaleX(-1); opacity: 0.3; box-shadow: 0 0 15px #ffd700;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2 style="margin:0">御万剑</h2>
        <p style="font-size: 13px; opacity: 0.8; line-height: 1.4;">
            ● <b>食指</b>：寻踪 | <b>双指并拢</b>：万剑穿心 (极速)<br>
            ● <b>手掌虚握</b>：聚气合一 (掌心汇聚) | <b>五指张开</b>：剑盾守护<br>
            ● <b>手掌立起</b>：剑刃旋风 (垂直旋转) | <b>侧掌</b>：扇形齐发
        </p>
    </div>
    <div id="video-container">
        <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const videoElement = document.getElementById('webcam');
        
        let width, height, globalTick = 0;
        const swordCount = 150; 
        const swords = [];
        let mouseControlActive = false;
        
        // 目标平滑系统
        let targetPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let lerpPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let currentMode = "FREE"; 

        // --- 灵魂音效系统 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playWhoosh(speed) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const duration = 0.15;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(600 + speed * 10, audioCtx.currentTime);
            filter.Q.value = 8;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(Math.min(speed / 600, 0.08), audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        class Sword {
            constructor(index) {
                this.index = index;
                this.init();
                this.angle = (index / swordCount) * Math.PI * 2;
                this.baseRadius = 100 + Math.random() * 100; 
                this.orbitSpeed = 0.03 + Math.random() * 0.02;
                this.swordSize = 1.3;
                this.noiseTheta = Math.random() * Math.PI * 2;
                this.historyLimit = 18; 
            }

            init() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.history = [];
            }

            update() {
                let tx = this.x, ty = this.y;

                if (currentMode === "FREE") {
                    this.noiseTheta += 0.02;
                    const targetAngle = Math.atan2(this.vy, this.vx) + Math.sin(this.noiseTheta + this.index) * 0.04;
                    const cruiseSpeed = 2.5;
                    this.vx += (Math.cos(targetAngle) * cruiseSpeed - this.vx) * 0.05;
                    this.vy += (Math.sin(targetAngle) * cruiseSpeed - this.vy) * 0.05;
                } else {
                    switch(currentMode) {
                        case "ORBIT":
                            this.angle += this.orbitSpeed;
                            tx = lerpPos.x + Math.cos(this.angle) * this.baseRadius;
                            ty = lerpPos.y + Math.sin(this.angle) * this.baseRadius;
                            break;
                        case "BURST":
                            const bDist = Math.cos(globalTick * 0.2 + this.index) * (this.baseRadius * 1.5);
                            tx = lerpPos.x + Math.cos(this.angle) * bDist;
                            ty = lerpPos.y + Math.sin(this.angle) * bDist;
                            this.vx = (tx - this.x) * 0.45; this.vy = (ty - this.y) * 0.45;
                            break;
                        case "SHIELD":
                            this.angle += 0.15;
                            tx = lerpPos.x + Math.cos(this.angle) * (60 + Math.random() * 10);
                            ty = lerpPos.y + Math.sin(this.angle) * (60 + Math.random() * 10);
                            break;
                        case "FAN":
                            const fanAngle = (this.index / swordCount - 0.5) * 2;
                            tx = lerpPos.x + Math.cos(fanAngle) * (180 + this.index * 0.3);
                            ty = lerpPos.y + Math.sin(fanAngle) * (180 + this.index * 0.3);
                            break;
                        case "GATHER": // 聚气合一
                            tx = lerpPos.x + (Math.random() - 0.5) * 20;
                            ty = lerpPos.y + (Math.random() - 0.5) * 20;
                            break;
                        case "VORTEX": // 旋风剑刃
                            this.angle += 0.2;
                            const vortexR = 40 + Math.sin(globalTick * 0.1 + this.index) * 20;
                            tx = lerpPos.x + Math.cos(this.angle) * vortexR;
                            ty = lerpPos.y + Math.sin(this.angle) * 200; // 垂直拉伸
                            break;
                    }
                    this.vx += (tx - this.x) * 0.22;
                    this.vy += (ty - this.y) * 0.22;
                    this.vx *= 0.8; this.vy *= 0.8;
                }

                this.x += this.vx; this.y += this.vy;

                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.x = (this.x + width) % width; this.y = (this.y + height) % height;
                    this.history = [];
                } else {
                    this.history.push({x: this.x, y: this.y});
                    if (this.history.length > this.historyLimit) this.history.shift();
                }

                if (currentMode !== "FREE" && Math.random() > 0.982) playWhoosh(Math.abs(this.vx) + Math.abs(this.vy));
            }

            draw() {
                if (this.history.length < 3) return;
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                const head = this.history[this.history.length - 1];
                const tail = this.history[0];
                const trailGrad = ctx.createLinearGradient(tail.x, tail.y, head.x, head.y);
                trailGrad.addColorStop(0, 'rgba(255, 215, 0, 0)');      
                trailGrad.addColorStop(0.5, 'rgba(255, 140, 0, 0.2)');  
                trailGrad.addColorStop(1, 'rgba(255, 255, 200, 0.5)'); 
                ctx.strokeStyle = trailGrad;
                ctx.lineWidth = 1.8;
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for(let i = 1; i < this.history.length; i++) ctx.lineTo(this.history[i].x, this.history[i].y);
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.atan2(this.vy, this.vx));
                const swordG = ctx.createLinearGradient(12 * this.swordSize, 0, -10 * this.swordSize, 0);
                swordG.addColorStop(0, '#ffffff'); swordG.addColorStop(0.4, '#ffd700'); swordG.addColorStop(1, '#664400');
                ctx.fillStyle = swordG;
                ctx.shadowBlur = 8; ctx.shadowColor = "#ffd700";
                ctx.beginPath();
                ctx.moveTo(12 * this.swordSize, 0);
                ctx.lineTo(-8 * this.swordSize, -2.5 * this.swordSize);
                ctx.lineTo(-4 * this.swordSize, 0);
                ctx.lineTo(-8 * this.swordSize, 2.5 * this.swordSize);
                ctx.fill();
                ctx.restore();
            }
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
            ctx.fillRect(0, 0, width, height);
            
            // 目标点平滑差值：让跟随感更丝滑
            lerpPos.x += (targetPos.x - lerpPos.x) * 0.15;
            lerpPos.y += (targetPos.y - lerpPos.y) * 0.15;

            globalTick++;
            swords.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(render);
        }

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults(results => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const indexTip = lm[8], middleTip = lm[12], ringTip = lm[16], pinkyTip = lm[20], thumbTip = lm[4];
                const indexBase = lm[5];

                targetPos.x = (1 - indexTip.x) * width;
                targetPos.y = indexTip.y * height;

                // 计算手势特征
                const isIndexUp = indexTip.y < lm[6].y;
                const isMiddleUp = middleTip.y < lm[10].y;
                const isRingUp = ringTip.y < lm[14].y;
                const isPinkyUp = pinkyTip.y < lm[18].y;
                const fingerCount = [isIndexUp, isMiddleUp, isRingUp, isPinkyUp].filter(Boolean).length;
                const palmVertical = Math.abs(indexTip.x - pinkyTip.x) < 0.05; // 手掌立起判定

                if (palmVertical && fingerCount >= 3) {
                    currentMode = "VORTEX"; // 旋风
                } else if (fingerCount === 4) {
                    currentMode = "SHIELD"; // 盾
                } else if (fingerCount === 0) {
                    currentMode = "GATHER"; // 聚气（握拳/虚握）
                } else if (isIndexUp && isMiddleUp && Math.hypot(indexTip.x - middleTip.x, indexTip.y - middleTip.y) < 0.04) {
                    currentMode = "BURST";  // 穿心
                } else if (Math.abs(indexTip.y - pinkyTip.y) < 0.06 && isIndexUp) {
                    currentMode = "FAN";    // 扇形
                } else if (isIndexUp) {
                    currentMode = "ORBIT";  // 寻踪
                } else {
                    currentMode = "FREE";
                }
            } else if(!mouseControlActive) currentMode = "FREE";
        });

        new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        }).start();

        window.addEventListener('mousemove', e => { if(mouseControlActive) { targetPos = {x: e.clientX, y: e.clientY}; currentMode = "ORBIT"; }});
        window.addEventListener('click', () => { mouseControlActive = !mouseControlActive; if(!mouseControlActive) currentMode = "FREE"; });
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
        for (let i = 0; i < swordCount; i++) swords.push(new Sword(i));
        render();
    </script>
</body>
</html>
